services:

  # ── Audit log database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guard_bands
      POSTGRES_USER: guard_bands
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guard_bands -d guard_bands"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Identity provider ─────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"   # admin console: http://localhost:8080
    healthcheck:
      # Keycloak 24 image has no curl; use bash TCP + /health/ready (requires KC_HEALTH_ENABLED=true)
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 3 cat <&3 | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - internal

  # ── SSO reverse proxy ─────────────────────────────────────────────────────
  #
  # All external traffic goes through here. oauth2-proxy validates the Bearer
  # token against Keycloak's JWKS endpoint and injects X-Auth-Request-User /
  # X-Auth-Request-Email before forwarding to the app.
  #
  # API flow:
  #   1. Client obtains a token from Keycloak:
  #        POST http://localhost:8080/realms/guard-bands/protocol/openid-connect/token
  #        -d 'client_id=guard-bands-api&client_secret=<KC_CLIENT_SECRET>
  #            &username=testuser&password=testpass123&grant_type=password'
  #   2. Client calls the API with the token:
  #        curl -H "Authorization: Bearer <token>" http://localhost:4180/wrap ...
  #
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    command:
      - --provider=keycloak-oidc
      - --oidc-issuer-url=http://keycloak:8080/realms/guard-bands
      - --client-id=guard-bands-api
      - --upstream=http://app:8000
      - --http-address=0.0.0.0:4180
      - --redirect-url=http://localhost:4180/oauth2/callback
      - --email-domain=*
      - --skip-jwt-bearer-tokens=true
      # --set-xauthrequest sets response headers (nginx auth_request mode only)
      # --pass-user-headers sets X-Forwarded-User/Email/Groups in upstream requests
      - --pass-user-headers=true
      - --cookie-secure=false
      - --skip-provider-button=true
      - --insecure-oidc-allow-unverified-email=true
      # Tokens fetched from localhost:8080 have iss=localhost; proxy discovers via
      # keycloak:8080 (Docker-internal). Skip the issuer check for dev — in prod
      # set KC_HOSTNAME_URL to a stable external URL shared by both.
      - --insecure-oidc-skip-issuer-verification=true
      - --skip-auth-regex=^/health$
    environment:
      OAUTH2_PROXY_CLIENT_SECRET: ${KC_CLIENT_SECRET:-dev-client-secret-change-in-prod}
      # 32-byte base64 cookie secret — CHANGE THIS IN PRODUCTION
      # Generate: python3 -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-Z3VhcmQtYmFuZHMtZGV2LWNvb2tpZS1zZWNyZXQhISE=}
    ports:
      - "4180:4180"   # public API entry point
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - internal

  # ── Guard Bands API ───────────────────────────────────────────────────────
  #
  # Port 8000 is intentionally NOT exposed externally.
  # All traffic must arrive via oauth2-proxy.
  #
  app:
    build: .
    environment:
      SECRET_KEY: ${SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4180}
      LLM_MODEL: ${LLM_MODEL:-claude-3-5-haiku-20241022}
      SSO_ENABLED: "true"
      REPLAY_PROTECTION_ENABLED: ${REPLAY_PROTECTION_ENABLED:-false}
      REPLAY_LEDGER_BACKEND: ${REPLAY_LEDGER_BACKEND:-memory}
      REPLAY_LEDGER_PATH: ${REPLAY_LEDGER_PATH:-data/replay-ledger.sqlite3}
      REPLAY_WINDOW_SECONDS: ${REPLAY_WINDOW_SECONDS:-900}
      LOG_POSTGRES_DSN: postgresql://guard_bands:${POSTGRES_PASSWORD:-changeme}@postgres:5432/guard_bands
      LOG_SPLUNK_HEC_URL: ${LOG_SPLUNK_HEC_URL:-}
      LOG_SPLUNK_HEC_TOKEN: ${LOG_SPLUNK_HEC_TOKEN:-}
      LOG_SPLUNK_INDEX: ${LOG_SPLUNK_INDEX:-guard_bands}
      LOG_SPLUNK_SOURCE: ${LOG_SPLUNK_SOURCE:-guard-bands-api}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  app_data:
