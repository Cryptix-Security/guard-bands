services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guard_bands
      POSTGRES_USER: guard_bands
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guard_bands -d guard_bands"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
